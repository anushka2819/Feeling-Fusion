<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <!-- Nervous character: A shaky circle with wide, worried eyes -->
    <circle cx="50" cy="50" r="40" fill="#BCAAA4" stroke="#8D6E63" stroke-width="4" />
    <!-- Nervous / Shaking Eyes -->
    <circle cx="35" cy="45" r="9" fill="white" />
    <circle cx="35" cy="45" r="4" fill="#3E2723" />
    <circle cx="33" cy="43" r="1.5" fill="white" />
    <circle cx="65" cy="45" r="9" fill="white" />
    <circle cx="65" cy="45" r="4" fill="#3E2723" />
    <circle cx="63" cy="43" r="1.5" fill="white" />
    <!-- Wiggly / Nervous Mouth -->
    <path d="M35,70 Q40,65 45,70 Q50,75 55,70 Q60,65 65,70" stroke="#3E2723" stroke-width="3" fill="none" stroke-linecap="round" />
    <!-- Sweat droplet of anxiety -->
    <circle cx="75" cy="30" r="4" fill="#90CAF9" opacity="0.6" />
</svg>
