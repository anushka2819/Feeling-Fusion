    <path d="M65,40 L55,45" stroke="#3E2723" stroke-width="3" stroke-linecap="round" />
    <circle cx="40" cy="48" r="4" fill="#3E2723" />
    <circle cx="60" cy="48" r="4" fill="#3E2723" />
    <!-- Sad / Frustrated Mouth -->
